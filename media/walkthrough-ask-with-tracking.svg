  <text x="120" y="165" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#1d2a38">1. Enter your prompt</text>
  <text x="145" y="228" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#4f5d6b">Explain this TypeScript error and propose a fix</text>
  <text x="120" y="278" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#1d2a38">2. Planned effort (hours)</text>
